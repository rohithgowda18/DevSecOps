services:
  order-service:
    build:
      context: ./order-service
      dockerfile: Dockerfile
    container_name: order-service
    ports:
      - "8080:8080"
    environment:
      - SERVER_PORT=8080
    networks:
      - devsecops-network
    depends_on:
      payment-service:
        condition: service_healthy

  payment-service:
    build:
      context: ./payment-service
      dockerfile: Dockerfile
    container_name: payment-service
    ports:
      - "8081:8081"
    environment:
      - SERVER_PORT=8081
    networks:
      - devsecops-network
    healthcheck:
      test: ["CMD", "wget", "-qO-", 
             "http://localhost:8081/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  devsecops-network:
    driver: bridge

