name: Security Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  gitleaks:
    name: GitLeaks Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
      - name: Run GitLeaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }} # Only if needed

  sonarcloud:
    name: SonarCloud Scan
    runs-on: ubuntu-latest
    needs: [gitleaks]
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Analyze Order Service with SonarCloud
        working-directory: ./MicroServices/order-service
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: mvn -B verify org.sonarsource.scanner.maven:sonar-maven-plugin:sonar -Dsonar.projectKey=order-service
      - name: Analyze Payment Service with SonarCloud
        working-directory: ./MicroServices/payment-service
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: mvn -B verify org.sonarsource.scanner.maven:sonar-maven-plugin:sonar -Dsonar.projectKey=payment-service

  trivy:
    name: Trivy Container Scan
    runs-on: ubuntu-latest
    needs: [sonarcloud]
    steps:
      - uses: actions/checkout@v3
      # We assume the images are built and pushed to Docker Hub by a parallel or previous job in a real scenario
      - name: Scan Order Service Docker Image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'order-service:latest'
          format: 'table'
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'
      - name: Scan Payment Service Docker Image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'payment-service:latest'
          format: 'table'
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'
