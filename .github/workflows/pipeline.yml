  # ─────────────────────────────────────────────
  # JOB 5 — DOCKER BUILD + IMAGE SCAN + PUSH
  #          (Rahul builds/pushes · Praveen scans)
  # Runs only after ALL three security jobs pass
  # ─────────────────────────────────────────────
  docker:
    needs: [ build ]  #gitleaks, sonarcloud, trivy-fs
    runs-on: ubuntu-latest
    steps:

      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Download Build Artifacts
        uses: actions/download-artifact@v3
        with:
          name: build-artifacts

      - name: Login to Docker Hub
        run: |
          echo "${{ secrets.DOCKER_PASSWORD }}" | \
          docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Build Order Service Image
        run: |
          docker build \
            -t ${{ secrets.DOCKER_USERNAME }}/order-service:latest \
            ./MicroServices/order-service

      - name: Build Payment Service Image
        run: |
          docker build \
            -t ${{ secrets.DOCKER_USERNAME }}/payment-service:latest \
            ./MicroServices/payment-service

