name: DevSecOps CI/CD Pipeline

on:
  push:
    branches: [ "*"]

jobs:

  # ─────────────────────────────────────────────
  # JOB 1 — BUILD (Rahul)
  # Compiles both Spring Boot services via Maven
  # ─────────────────────────────────────────────
  build:
    runs-on: ubuntu-latest
    steps:

      - name: Checkout Code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0          # full history needed for GitLeaks & SonarCloud

      - name: Setup Java 17
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Cache Maven Dependencies
        uses: actions/cache@v3
        with:
          path: ~/.m2
          key: maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: maven-

      - name: Build Order Service
        run: |
          cd MicroServices/order-service
          mvn clean package -DskipTests

      - name: Build Payment Service
        run: |
          cd MicroServices/payment-service
          mvn clean package -DskipTests

      # Share compiled JARs with the docker job
      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v3
        with:
          name: build-artifacts
          path: |
            MicroServices/order-service/target/*.jar
            MicroServices/payment-service/target/*.jar


