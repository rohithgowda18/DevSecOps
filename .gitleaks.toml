title = "Aggressive secret detection rules (CI)"

# [allowlist]
# description = "No global allowlist; keep detection aggressive"
# paths = []
# regexes = []

# -----------------------------
# Private keys (PEM blocks)
# -----------------------------
[[rules]]
id = "private-key-pem"
description = "Private key PEM blocks"
regex = '''-----BEGIN (?:RSA|EC|DSA|OPENSSH|PGP|PRIVATE) KEY-----[\s\S]*?-----END (?:RSA|EC|DSA|OPENSSH|PGP|PRIVATE) KEY-----'''
tags = ["key", "private", "pem"]

# -----------------------------
# AWS Access Key ID (AKIA/ASIA/etc.)
# Note: example keys may still be allowlisted by default gitleaks rules;
# custom rule helps catch them.
# -----------------------------
[[rules]]
id = "aws-access-key-id"
description = "AWS Access Key ID"
regex = '''\b(A3T[A-Z0-9]|AKIA|ASIA|AROA|AIDA|ANPA|ANVA|ASCA)[A-Z0-9]{16}\b'''
tags = ["aws", "access-key"]

# -----------------------------
# AWS Secret Access Key (best-effort)
# Looks for 'aws' + 'secret' + a 40-char base64-ish token nearby
# -----------------------------
[[rules]]
id = "aws-secret-access-key"
description = "AWS Secret Access Key (contextual)"
regex = '''(?i)\baws\b[\s\S]{0,80}\b(secret|secret[_-]?access[_-]?key)\b[\s\S]{0,40}[:=]\s*['"]?[A-Za-z0-9\/+=]{40}['"]?'''
tags = ["aws", "secret"]

# -----------------------------
# GitHub tokens
# -----------------------------
[[rules]]
id = "github-pat"
description = "GitHub Personal Access Token / fine-grained token"
regex = '''\b(ghp|gho|ghu|ghs|ghr)_[A-Za-z0-9]{20,200}\b'''
tags = ["github", "token"]

# -----------------------------
# GitLab tokens
# -----------------------------
[[rules]]
id = "gitlab-token"
description = "GitLab token"
regex = '''\b(glpat-[A-Za-z0-9\-_]{20,200})\b'''
tags = ["gitlab", "token"]

# -----------------------------
# Slack tokens
# -----------------------------
[[rules]]
id = "slack-token"
description = "Slack token"
regex = '''\b(xox[baprs]-[A-Za-z0-9-]{10,200})\b'''
tags = ["slack", "token"]

# -----------------------------
# Stripe API keys
# -----------------------------
[[rules]]
id = "stripe-key"
description = "Stripe secret key"
regex = '''\b(sk_(live|test)_[A-Za-z0-9]{10,200})\b'''
tags = ["stripe", "token"]

# -----------------------------
# Twilio
# -----------------------------
[[rules]]
id = "twilio-api-key"
description = "Twilio API Key (SK...)"
regex = '''\bSK[0-9a-fA-F]{32}\b'''
tags = ["twilio", "key"]

[[rules]]
id = "twilio-auth-token"
description = "Twilio Auth Token (contextual)"
regex = '''(?i)\btwilio\b[\s\S]{0,80}\b(auth[_-]?token)\b[\s\S]{0,40}[:=]\s*['"]?[0-9a-fA-F]{32}['"]?'''
tags = ["twilio", "token"]

# -----------------------------
# SendGrid
# -----------------------------
[[rules]]
id = "sendgrid-key"
description = "SendGrid API key"
regex = '''\bSG\.[A-Za-z0-9_\-]{10,}\.[A-Za-z0-9_\-]{10,}\b'''
tags = ["sendgrid", "token"]

# -----------------------------
# Generic API key / secret assignment
# Catches apiKey=..., api_key: "...", token="...", secret=...
# -----------------------------
[[rules]]
id = "generic-api-key-assignment"
description = "Generic API key/token/secret/password assignment"
regex = '''(?i)\b(api[_-]?key|apikey|token|secret|password|passwd|pwd|bearer)\b\s*[:=]\s*['"][^'"\r\n]{8,}['"]'''
tags = ["generic", "secret"]

# -----------------------------
# Authorization: Bearer <token>
# -----------------------------
[[rules]]
id = "bearer-token"
description = "HTTP Bearer token"
regex = '''(?i)\bAuthorization\b\s*[:=]\s*['"]?Bearer\s+[A-Za-z0-9\-_\.=]{20,}['"]?'''
tags = ["http", "token"]

# -----------------------------
# High entropy string (catch-all)
# This is intentionally broad and will produce false positives.
# -----------------------------
[[rules]]
id = "high-entropy-string"
description = "High entropy string (potential secret)"
regex = '''\b[A-Za-z0-9\/+=]{32,}\b'''
entropy = 3.6
tags = ["entropy", "generic"]
